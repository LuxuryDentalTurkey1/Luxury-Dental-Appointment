[build]
  command = "npm run build"

[build.environment]
  # Next.js 16 needs a modern Node; pin it so Netlify doesn't use an old default.
  NODE_VERSION = "20"
  # NEXT_PUBLIC_* values are meant to ship in the browser bundle, which trips
  # Netlify's secret scanner. We control our env, so turn the scanner off.
  SECRETS_SCAN_ENABLED = "false"
